[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[dev]
  targetPort = 3000
  port = 8888

# === Legacy PHP/CodeIgniter URLs from the old Plesk site ====================
# We redirect with 301 so old indexed links still work and pass link equity.

# /home/index.php/pages/* (the canonical legacy tree)
[[redirects]]
  from = "/home/index.php/pages/frequently-asked-questions"
  to = "/faq"
  status = 301
  force = true

[[redirects]]
  from = "/home/index.php/pages/commercial-laundry-for-institutions-and-businesses"
  to = "/clients"
  status = 301
  force = true

[[redirects]]
  from = "/home/index.php/pages/laundry-and-dry-cleaning-for-residents-and-students"
  to = "/clients"
  status = 301
  force = true

[[redirects]]
  from = "/home/index.php/pages/what-we-do"
  to = "/clients"
  status = 301
  force = true

[[redirects]]
  from = "/home/index.php/pages/who-we-are"
  to = "/about"
  status = 301
  force = true

[[redirects]]
  from = "/home/index.php/pages/contact-us"
  to = "/contact"
  status = 301
  force = true

[[redirects]]
  from = "/home/index.php/pages/privacy-policy"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/home/index.php/pages/delete-my-account"
  to = "/contact"
  status = 301
  force = true

[[redirects]]
  from = "/home/index.php/pages/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
