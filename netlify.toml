[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect legacy PHP URLs from the old Plesk site so old indexed links still work
[[redirects]]
  from = "/home/index.php/pages/frequently-asked-questions"
  to = "/faq"
  status = 301
  force = true

[[redirects]]
  from = "/home/index.php/pages/commercial-laundry-for-institutions-and-businesses"
  to = "/commercial"
  status = 301
  force = true

[[redirects]]
  from = "/home/index.php/pages/laundry-and-dry-cleaning-for-residents-and-students"
  to = "/services"
  status = 301
  force = true

[[redirects]]
  from = "/home/index.php/pages/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/home/index.php"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/home/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/appdownload"
  to = "/app"
  status = 301
  force = true

[[redirects]]
  from = "/appdownload/*"
  to = "/app"
  status = 301
  force = true

# SPA fallback — every non-asset URL serves index.html so React Router can handle it
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
