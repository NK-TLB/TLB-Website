# Legacy B2C route now folds into the B2B services page
[[redirects]]
  from = "/services"
  to = "/clients"
  status = 301
  force = true

[[redirects]]
  from = "/what-we-do"
  to = "/clients"
  status = 301
  force = true

[[redirects]]
  from = "/commercial"
  to = "/clients"
  status = 301
  force = true

# SPA fallback — every non-asset URL serves index.html so React Router can handle it
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
