    <script>
      // Apply the saved template (and its web font) before paint to avoid a
      // flash of the default design.
      (function () {
        try {
          var fonts = {
            editorial:
              "https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap",
            precision:
              "https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap",
            brutalist:
              "https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&display=swap",
            glass:
              "https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap",
            friendly:
              "https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap",
          };
          var t = localStorage.getItem("tlb-theme");
          if (t && fonts.hasOwnProperty(t)) {
            document.documentElement.setAttribute("data-theme", t);
            var l = document.createElement("link");
            l.rel = "stylesheet";
            l.href = fonts[t];
            l.setAttribute("data-theme-font", "");
            document.head.appendChild(l);
          }
        } catch (e) {}
      })();
    </script>
